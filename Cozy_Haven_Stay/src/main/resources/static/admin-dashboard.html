<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Cozy Haven Stay</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid mt-4">
  <div class="row">
    <!-- SIDEBAR -->
    <div class="col-md-3">
      <div class="dash-sidebar text-center">
        <div class="mb-4">
          <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQkAg6KSS1O5eXQy0iXXghPdSOrBPBMpQkpJcz5_UpAF9uGUuJK"
               style="width:70px;height:70px;border-radius:50%;margin-bottom:8px;">
          <h6 id="adminName">Loading...</h6>
          <small style="color:#888;" id="adminRole">Administrator</small>
        </div>
        <hr>
        <div class="dash-nav">
          <a href="admin-dashboard.html" class="active"><i class="fa fa-home"></i> Dashboard</a>
          <a href="manage-users.html"><i class="fa fa-users"></i> Manage Users</a>
          <a href="manage-owners.html"><i class="fa fa-user-shield"></i> Manage Owners</a>
          <a href="bookings.html"><i class="fa fa-calendar"></i> All Bookings</a>
          <a href="admin-profile.html"><i class="fa fa-user"></i> Profile</a>
          <a href="index.html" id="adminLogout"><i class="fa fa-sign-out"></i> Logout</a>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-9">
      <div class="welcome-bar mb-4">
        <h5>Welcome, <span id="welcomeAdmin">Admin</span>!</h5>
        <p>Manage platform users and bookings</p>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const role = sessionStorage.getItem('userRole');
  if (!role || role !== 'ADMIN') {
    window.location.href = 'login.html';
    return;
  }

  const email = sessionStorage.getItem('userEmail');
  document.getElementById('adminName').innerText = email;
  document.getElementById('welcomeAdmin').innerText = email;

  document.getElementById('adminLogout').addEventListener('click', () => {
    sessionStorage.clear();
    window.location.href = 'login.html';
  });
});
</script>

</body>
</html>
