<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users - Cozy Haven Stay</title>
<link rel="icon" type="image/png" href="images/cozy.png" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid mt-4">
  <div class="row">
    <!-- SIDEBAR -->
    <div class="col-md-3">
      <div class="dash-sidebar text-center">
        <div class="mb-4">
          <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQkAg6KSS1O5eXQy0iXXghPdSOrBPBMpQkpJcz5_UpAF9uGUuJK"
               style="width:70px;height:70px;border-radius:50%;margin-bottom:8px;">
          <h6 id="adminName">Loading...</h6>
          <small style="color:#888;">Administrator</small>
        </div>
        <hr>
        <div class="dash-nav text-start">
          <a href="admin-dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
          <a href="manage-users.html" class="active"><i class="fa fa-users"></i> Manage Users</a>
          <a href="manage-owners.html"><i class="fa fa-user-shield"></i> Manage Owners</a>
          <a href="bookings.html"><i class="fa fa-calendar"></i> All Bookings</a>
          <a href="admin-profile.html"><i class="fa fa-user"></i> Profile</a>
          <a href="index.html" id="adminLogout"><i class="fa fa-sign-out"></i> Logout</a>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-9">
      <div class="welcome-bar mb-4">
        <h5>Manage Users</h5>
        <p>View and manage all registered users in the system</p>
      </div>

      <!-- Users Table -->
      <div class="card">
        <div class="card-body">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>User ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Role</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="usersTable">
              <tr><td colspan="8" class="text-center text-muted">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

function getAuthHeaders() {
  const email    = sessionStorage.getItem('userEmail');
  const password = sessionStorage.getItem('userPassword');
  if (!email || !password) {
    window.location.href = 'login.html';
    return {};
  }
  return {
    'Authorization': `Basic ${btoa(`${email}:${password}`)}`,
    'Content-Type': 'application/json'
  };
}

document.addEventListener('DOMContentLoaded', () => {
  const role = sessionStorage.getItem('userRole');
  if (!role || role !== 'ADMIN') {
    window.location.href = 'login.html';
    return;
  }

  document.getElementById('adminName').innerText = sessionStorage.getItem('userEmail');

  document.getElementById('adminLogout').addEventListener('click', () => {
    sessionStorage.clear();
    window.location.href = 'login.html';
  });

  loadUsers();
});

function loadUsers() {
  const usersTable = document.getElementById('usersTable');
  usersTable.innerHTML = `<tr><td colspan="8" class="text-center text-muted">Loading...</td></tr>`;

  fetch('http://localhost:8080/api/users/getall', {
    method: 'GET',
    credentials: 'include',
    headers: getAuthHeaders()
  })
  .then(res => {
    if (res.status === 401) {
      alert('Unauthorized. Please login as admin.');
      window.location.href = 'login.html';
      return;
    }
    if (!res.ok) throw new Error('Network response not ok');
    return res.json();
  })
  .then(users => {
    if (!users) return;

    usersTable.innerHTML = '';

    if (users.length === 0) {
      usersTable.innerHTML = `<tr><td colspan="8" class="text-center text-muted">No users found</td></tr>`;
      return;
    }

    users.forEach(user => {
      const userId    = user.userId    ?? user.user_id    ?? 'N/A';
      const name      = user.name      ?? 'N/A';
      const email     = user.email     ?? 'N/A';
      const phone     = user.phone     ?? 'N/A';
      const address   = user.address   ?? 'N/A';
      const role      = user.role      ?? 'N/A';
      

     
      let roleBadge = '';
      switch (role) {
        case 'ADMIN':
          roleBadge = `<span class="badge bg-danger-subtle text-danger border border-danger-subtle rounded-pill px-2">Admin</span>`;
          break;
        case 'OWNER':
          roleBadge = `<span class="badge bg-warning-subtle text-warning border border-warning-subtle rounded-pill px-2">Owner</span>`;
          break;
        case 'USER':
          roleBadge = `<span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-2">User</span>`;
          break;
        default:
          roleBadge = `<span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle rounded-pill px-2">${role}</span>`;
      }

      
      const loggedInEmail = sessionStorage.getItem('userEmail');
      const isSelf     = email === loggedInEmail;
      const isAdmin    = role === 'ADMIN';
      const isDisabled = isSelf || isAdmin;

     
      let btnLabel = 'Delete';
      let btnTitle = '';
      if (isSelf)       { btnLabel = 'You';  btnTitle = 'Cannot delete your own account'; }
      else if (isAdmin) { btnLabel = 'Admin'; btnTitle = 'Cannot delete admin users'; }

      const row = document.createElement('tr');
      row.id = `user-row-${userId}`;
      row.innerHTML = `
        <td>${userId}</td>
        <td><strong>${name}</strong></td>
        <td>${email}</td>
        <td>${phone}</td>
        <td>${address}</td>
        <td>${roleBadge}</td>
        
        <td>
          <button
            class="btn btn-danger btn-sm"
            id="btn-delete-${userId}"
            onclick="deleteUser(${userId}, '${email}')"
            ${isDisabled ? `disabled title="${btnTitle}"` : ''}>
            <i class="fa fa-trash me-1"></i>${btnLabel}
          </button>
        </td>
      `;
      usersTable.appendChild(row);
    });
  })
  .catch(err => {
    console.error('Error fetching users:', err);
    usersTable.innerHTML = `<tr><td colspan="8" class="text-center text-danger">Failed to load users. Please try again.</td></tr>`;
  });
}

function deleteUser(userId, email) {
  if (!confirm(`Are you sure you want to delete user "${email}"?\nThis cannot be undone.`)) return;

  const btn = document.getElementById(`btn-delete-${userId}`);
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = `<i class="fa fa-spinner fa-spin me-1"></i>Deleting...`;
  }

  fetch(`http://localhost:8080/api/users/delete/${userId}`, {
    method: 'DELETE',
    credentials: 'include',
    headers: getAuthHeaders()
  })
  .then(res => {
    if (res.status === 401) {
      alert('Unauthorized. Please login again.');
      window.location.href = 'login.html';
      return;
    }
    if (!res.ok) {
      return res.text().then(text => { throw new Error(text || `Server returned ${res.status}`); });
    }
    return res.text(); 
  })
  .then(data => {
    if (data === undefined) return;

    
    const row = document.getElementById(`user-row-${userId}`);
    if (row) row.remove();

   
    const usersTable = document.getElementById('usersTable');
    if (usersTable.children.length === 0) {
      usersTable.innerHTML = `<tr><td colspan="8" class="text-center text-muted">No users found</td></tr>`;
    }
  })
  .catch(err => {
    console.error('Error deleting user:', err);
    alert(`Error deleting user: ${err.message}`);
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = `<i class="fa fa-trash me-1"></i>Delete`;
    }
  });
}
</script>

</body>
</html>
