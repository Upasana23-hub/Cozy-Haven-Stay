<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Bookings - Cozy Haven Stay</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid mt-4">
  <div class="row">
    <!-- SIDEBAR -->
    <div class="col-md-3">
      <div class="dash-sidebar text-center">
        <div class="mb-4">
          <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQkAg6KSS1O5eXQy0iXXghPdSOrBPBMpQkpJcz5_UpAF9uGUuJK" 
               style="width:70px;height:70px;border-radius:50%;margin-bottom:8px;">
          <h6 id="adminName">Loading...</h6>
          <small style="color:#888;" id="adminRole">Administrator</small>
        </div>
        <hr>
        <div class="dash-nav text-start">
          <a href="admin-dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
          <a href="manage-users.html"><i class="fa fa-users"></i> Manage Users</a>
          <a href="manage-owners.html"><i class="fa fa-user-shield"></i> Manage Owners</a>
          <a href="bookings.html" class="active"><i class="fa fa-calendar"></i> All Bookings</a>
          <a href="user-profile.html"><i class="fa fa-user"></i> Profile</a>
          <a href="index.html" id="adminLogout"><i class="fa fa-sign-out"></i> Logout</a>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-9">
      <div class="welcome-bar mb-4">
        <h5>All Bookings</h5>
        <p>View and manage all bookings in the system</p>
      </div>

      <!-- Bookings Table -->
      <div class="card">
        <div class="card-body">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Booking ID</th>
                <th>User</th>
                <th>Room</th>
                <th>Check-In</th>
                <th>Check-Out</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="bookingsTable">
              <!-- Bookings will be dynamically loaded here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const role = sessionStorage.getItem('userRole');
  if (!role || role !== 'ADMIN') {
    window.location.href = 'login.html';
    return;
  }

  const email = sessionStorage.getItem('userEmail');
  document.getElementById('adminName').innerText = email;

  document.getElementById('adminLogout').addEventListener('click', () => {
    sessionStorage.clear();
    window.location.href = 'login.html';
  });

  const bookingsTable = document.getElementById('bookingsTable');

  // Fetch all bookings
  fetch('http://localhost:8080/api/bookings/getall', {
    method: 'GET',
    credentials: 'include'
  })
  .then(res => {
    if (res.status === 401) {
      alert('Unauthorized. Please login as admin.');
      window.location.href = 'login.html';
      return;
    }
    if (!res.ok) throw new Error('Network response not ok');
    return res.json();
  })
  .then(bookings => {
    if (!bookings || bookings.length === 0) {
      bookingsTable.innerHTML = `<tr><td colspan="7" class="text-center text-muted">No bookings found</td></tr>`;
      return;
    }

    bookings.forEach((booking) => {
      const bookingId = booking.bookingId || 'N/A';
      const userId    = booking.userId    || 'N/A';
      const roomId    = booking.roomId    || 'N/A';
      const checkIn   = booking.checkIn   || '';
      const checkOut  = booking.checkOut  || '';
      const status    = booking.bookingStatus ?? 'Unknown';

      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${bookingId}</td>
        <td>${userId}</td>
        <td>${roomId}</td>
        <td>${checkIn}</td>
        <td>${checkOut}</td>
        <td>${status}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="cancelBooking(${bookingId})" ${status === 'CANCELLED' ? 'disabled' : ''}>Cancel</button>
        </td>
      `;
      bookingsTable.appendChild(row);
    });
  })
  .catch(err => {
    console.error('Error fetching bookings:', err);
    bookingsTable.innerHTML = `<tr><td colspan="7" class="text-center text-danger">Failed to load bookings</td></tr>`;
  });
});

// Cancel booking function
function cancelBooking(bookingId) {
  if (!confirm('Are you sure you want to cancel this booking?')) return;

  fetch(`http://localhost:8080/api/bookings/cancel/${bookingId}`, {
    method: 'PUT',
    credentials: 'include'
  })
  .then(res => {
    if (res.status === 401) {
      alert('Unauthorized. Please login again.');
      window.location.href = 'login.html';
      return;
    }
    if (!res.ok) throw new Error('Failed to cancel booking');
    return res.json();
  })
  .then(data => {
    alert(`Booking ${data.bookingId} cancelled successfully`);
    location.reload();
  })
  .catch(err => {
    console.error('Error cancelling booking:', err);
    alert('Error cancelling booking.');
  });
}
</script>

</body>
</html>
