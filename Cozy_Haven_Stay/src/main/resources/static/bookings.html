<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Bookings - Cozy Haven Stay</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid mt-4">
  <div class="row">
    <!-- SIDEBAR -->
    <div class="col-md-3">
      <div class="dash-sidebar text-center">
        <div class="mb-4">
          <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQkAg6KSS1O5eXQy0iXXghPdSOrBPBMpQkpJcz5_UpAF9uGUuJK" 
               style="width:70px;height:70px;border-radius:50%;margin-bottom:8px;">
          <h6 id="adminName">Loading...</h6>
          <small style="color:#888;" id="adminRole">Administrator</small>
        </div>
        <hr>
        <div class="dash-nav text-start">
          <a href="admin-dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
          <a href="manage-users.html"><i class="fa fa-users"></i> Manage Users</a>
          <a href="manage-owners.html"><i class="fa fa-user-shield"></i> Manage Owners</a>
          <a href="bookings.html" class="active"><i class="fa fa-calendar"></i> All Bookings</a>
          <a href="admin-profile.html"><i class="fa fa-user"></i> Profile</a>
          <a href="index.html" id="adminLogout"><i class="fa fa-sign-out"></i> Logout</a>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-9">
      <div class="welcome-bar mb-4">
        <h5>All Bookings</h5>
        <p>View and manage all bookings in the system</p>
      </div>

      <!-- Bookings Table -->
      <div class="card">
        <div class="card-body">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Booking ID</th>
                <th>User</th>
                <th>Room</th>
                <th>Check-In</th>
                <th>Check-Out</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="bookingsTable">
              <tr><td colspan="7" class="text-center text-muted">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

// ✅ Helper: builds Basic Auth header from stored credentials
function getAuthHeaders() {
  const email    = sessionStorage.getItem('userEmail');
  const password = sessionStorage.getItem('userPassword');
  if (!email || !password) {
    window.location.href = 'login.html';
    return {};
  }
  const encoded = btoa(`${email}:${password}`);
  return {
    'Authorization': `Basic ${encoded}`,
    'Content-Type': 'application/json'
  };
}

document.addEventListener('DOMContentLoaded', () => {
  const role = sessionStorage.getItem('userRole');
  if (!role || role !== 'ADMIN') {
    window.location.href = 'login.html';
    return;
  }

  document.getElementById('adminName').innerText = sessionStorage.getItem('userEmail');

  document.getElementById('adminLogout').addEventListener('click', () => {
    sessionStorage.clear();
    window.location.href = 'login.html';
  });

  loadBookings();
});

function loadBookings() {
  const bookingsTable = document.getElementById('bookingsTable');
  bookingsTable.innerHTML = `<tr><td colspan="7" class="text-center text-muted">Loading...</td></tr>`;

  fetch('http://localhost:8080/api/bookings/getall', {
    method: 'GET',
    credentials: 'include',
    headers: getAuthHeaders() // ✅ Basic Auth header
  })
  .then(res => {
    if (res.status === 401) {
      alert('Unauthorized. Please login as admin.');
      window.location.href = 'login.html';
      return;
    }
    if (!res.ok) throw new Error('Network response not ok');
    return res.json();
  })
  .then(bookings => {
    if (!bookings) return;

    bookingsTable.innerHTML = '';

    if (bookings.length === 0) {
      bookingsTable.innerHTML = `<tr><td colspan="7" class="text-center text-muted">No bookings found</td></tr>`;
      return;
    }

    bookings.forEach((booking) => {
      // ✅ Support nested objects — user and room may be objects
      const bookingId = booking.bookingId ?? booking.booking_id ?? 'N/A';
      const userEmail = booking.user?.email ?? booking.userId ?? booking.user_id ?? 'N/A';
      const roomNumber = booking.room?.roomNumber ?? booking.roomId ?? booking.room_id ?? 'N/A';
      const checkIn   = booking.checkIn  ?? booking.check_in  ?? '';
      const checkOut  = booking.checkOut ?? booking.check_out ?? '';
      const status    = booking.bookingStatus ?? booking.status ?? 'Unknown';

      // ✅ Format dates nicely
      const formatDate = (d) => d
        ? new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
        : 'N/A';

      // ✅ Status badge
      let statusBadge = '';
      switch (status) {
        case 'CONFIRMED':
          statusBadge = `<span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-2">Confirmed</span>`;
          break;
        case 'CANCELLED':
          statusBadge = `<span class="badge bg-danger-subtle text-danger border border-danger-subtle rounded-pill px-2">Cancelled</span>`;
          break;
        case 'PENDING':
          statusBadge = `<span class="badge bg-warning-subtle text-warning border border-warning-subtle rounded-pill px-2">Pending</span>`;
          break;
        default:
          statusBadge = `<span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle rounded-pill px-2">${status}</span>`;
      }

      const row = document.createElement('tr');
      row.id = `booking-row-${bookingId}`;
      row.innerHTML = `
        <td>${bookingId}</td>
        <td>${userEmail}</td>
        <td><strong>${roomNumber}</strong></td>
        <td>${formatDate(checkIn)}</td>
        <td>${formatDate(checkOut)}</td>
        <td>${statusBadge}</td>
        <td>
          <button
            class="btn btn-danger btn-sm"
            id="btn-cancel-${bookingId}"
            onclick="cancelBooking(${bookingId})"
            ${status === 'CANCELLED' ? 'disabled' : ''}>
            <i class="fa fa-times me-1"></i>${status === 'CANCELLED' ? 'Cancelled' : 'Cancel'}
          </button>
        </td>
      `;
      bookingsTable.appendChild(row);
    });
  })
  .catch(err => {
    console.error('Error fetching bookings:', err);
    bookingsTable.innerHTML = `<tr><td colspan="7" class="text-center text-danger">Failed to load bookings. Please try again.</td></tr>`;
  });
}

function cancelBooking(bookingId) {
  if (!confirm(`Are you sure you want to cancel Booking #${bookingId}? This cannot be undone.`)) return;

  const btn = document.getElementById(`btn-cancel-${bookingId}`);
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = `<i class="fa fa-spinner fa-spin me-1"></i>Cancelling...`;
  }

  fetch(`http://localhost:8080/api/bookings/cancel/${bookingId}`, {
    method: 'PUT',
    credentials: 'include',
    headers: getAuthHeaders() // ✅ Basic Auth header
  })
  .then(res => {
    if (res.status === 401) {
      alert('Unauthorized. Please login again.');
      window.location.href = 'login.html';
      return;
    }
    if (!res.ok) throw new Error('Failed to cancel booking');
    return res.json();
  })
  .then(data => {
    if (!data) return;

    alert(`Booking #${bookingId} cancelled successfully!`);

    // ✅ Update row inline — no full reload needed
    const statusCell = document.querySelector(`#booking-row-${bookingId} td:nth-child(6)`);
    if (statusCell) {
      statusCell.innerHTML = `<span class="badge bg-danger-subtle text-danger border border-danger-subtle rounded-pill px-2">Cancelled</span>`;
    }
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = `<i class="fa fa-times me-1"></i>Cancelled`;
    }
  })
  .catch(err => {
    console.error('Error cancelling booking:', err);
    alert('Error cancelling booking. Please try again.');
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = `<i class="fa fa-times me-1"></i>Cancel`;
    }
  });
}
</script>

</body>
</html>
