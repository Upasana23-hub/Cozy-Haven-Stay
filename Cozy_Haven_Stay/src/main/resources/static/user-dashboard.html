<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard - Cozy Haven Stay</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container-fluid mt-4">
  <div class="row">
    <div class="col-md-3">
      <div class="dash-sidebar text-center">
        <div class="mb-4">
          <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQkAg6KSS1O5eXQy0iXXghPdSOrBPBMpQkpJcz5_UpAF9uGUuJK" style="width:70px;height:70px;border-radius:50%;margin-bottom:8px;">
          <h6 id="sidebarUserName">Loading...</h6>
          <small style="color:#888;" id="sidebarUserRole">User</small>
        </div>
        <hr>
        <div class="dash-nav">
          <a href="user-dashboard.html" class="active"><i class="fa fa-home"></i> Dashboard</a>
          <a href="hotels.html"><i class="fa fa-hotel"></i> Search Hotels</a>
          <a href="booking-user.html"><i class="fa fa-calendar"></i> My Bookings</a>
          <a href="my-reviews.html"><i class="fa fa-star"></i> Reviews</a>
          <a href="user-profile.html"><i class="fa fa-user"></i> Profile</a>
          <a href="#" id="sidebarLogout"><i class="fa fa-sign-out"></i> Logout</a>
        </div>
      </div>
    </div>
    <div class="col-md-9">
      <div class="welcome-bar">
        <h5>Welcome, <span id="welcomeName">User</span>!</h5>
        <p>Manage your bookings and explore hotels easily</p>
      </div>
      <!-- Stats and other content here -->
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
	  const role = sessionStorage.getItem('userRole');
	  if (!role || role !== 'USER') {
	    window.location.href = 'login.html';
	    return;
	  }

	  // Display user info
	  const email = sessionStorage.getItem('userEmail');
	  document.getElementById('sidebarUserName').innerText = email;
	  document.getElementById('welcomeName').innerText = email;

	  // Logout
	  document.getElementById('sidebarLogout').addEventListener('click', () => {
	    sessionStorage.clear();
	    window.location.href = 'login.html';
	  });

	  // Optionally, fetch stats for hotels/bookings here
	  // fetch('/api/...').then(...);
	});
</script>
</body>
</html>
