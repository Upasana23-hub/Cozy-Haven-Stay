<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Dashboard - Cozy Haven Stay</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid mt-4">
  <div class="row">
    <!-- SIDEBAR -->
    <div class="col-md-3">
      <div class="dash-sidebar text-center">
        <div class="mb-4">
          <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQkAg6KSS1O5eXQy0iXXghPdSOrBPBMpQkpJcz5_UpAF9uGUuJK" 
               style="width:70px;height:70px;border-radius:50%;margin-bottom:8px;">
          <h6 id="ownerName">Loading...</h6>
          <small style="color:#888;" id="ownerRole">Owner</small>
        </div>
        <hr>
        <div class="dash-nav">
          <a href="owner-dashboard.html" class="active"><i class="fa fa-home"></i> Dashboard</a>
          <a href="#roomsSection"><i class="fa fa-bed"></i> Manage Rooms</a>
          <a href="#bookingsSection"><i class="fa fa-calendar"></i> Hotel Bookings</a>
          <a href="owner-profile.html"><i class="fa fa-user"></i> Profile</a>
          <a href="#" id="ownerLogout"><i class="fa fa-sign-out"></i> Logout</a>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-9">
      <div class="welcome-bar mb-4">
        <h5>Welcome, <span id="welcomeOwner">Owner</span>!</h5>
        <p>Manage your hotel rooms and bookings</p>
      </div>

      <!-- Stats -->
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="stat-card">
            <div class="stat-icon pink"><i class="fa fa-bed"></i></div>
            <div>
              <div class="stat-val" id="totalRooms">0</div>
              <div class="stat-lbl">Total Rooms</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="stat-card">
            <div class="stat-icon purple"><i class="fa fa-calendar"></i></div>
            <div>
              <div class="stat-val" id="totalBookings">0</div>
              <div class="stat-lbl">Bookings</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="stat-card">
            <div class="stat-icon green"><i class="fa fa-money-bill"></i></div>
            <div>
              <div class="stat-val" id="totalRevenue">₹0</div>
              <div class="stat-lbl">Revenue</div>
            </div>
          </div>
        </div>
      </div>

      <!-- ROOMS TABLE -->
      <div class="card mb-4" id="roomsSection">
        <div class="card-body">
          <h6 class="mb-3">Manage Rooms</h6>
          <table class="table">
            <thead>
              <tr>
                <th>Room ID</th>
                <th>Room Size</th>
                <th>Bed Type</th>
                <th>Capacity</th>
                <th>Price</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="roomsTable">
              <!-- Rooms will be dynamically loaded -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- BOOKINGS TABLE -->
      <div class="card" id="bookingsSection">
        <div class="card-body">
          <h6 class="mb-3">Hotel Bookings</h6>
          <table class="table">
            <thead>
              <tr>
                <th>User</th>
                <th>Room</th>
                <th>Check-In</th>
                <th>Check-Out</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="bookingsTable">
              <!-- Bookings will be dynamically loaded -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
	  const role = sessionStorage.getItem('userRole');
	  if (!role || role !== 'OWNER') {
	    window.location.href = 'login.html';
	    return;
	  }

	  // Display owner info if needed
	  const email = sessionStorage.getItem('userEmail');
	  document.getElementById('ownerName').innerText = email;

	  // Logout
	  document.getElementById('sidebarLogout').addEventListener('click', () => {
	    sessionStorage.clear();
	    window.location.href = 'login.html';
	  });

	  // Optionally fetch owner-specific data (rooms, bookings)
	  // fetch('/api/owner/...').then(...);
	});
</script>

</body>
</html>
