<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cozy Haven Stay | My Bookings</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body {
            background: linear-gradient(rgba(255,250,252,0.85), rgba(255,250,252,0.85)), url('images/booking.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
        .top-nav {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(12px);
            border-bottom: 1.5px solid #f5e0ee;
            padding: 10px 0;
            box-shadow: 0 2px 16px rgba(233,30,140,0.07);
        }
        .booking-card {
            background: #fff;
            border-radius: 18px;
            border: 1px solid #f5e0ee;
            padding: 36px;
            max-width: 520px;
            margin: 40px auto;
            box-shadow: 0 8px 32px rgba(233,30,140,0.09);
        }
        .booking-title { font-weight: 800; color: var(--pink); margin-bottom: 8px; }
        .bookings-section { padding: 40px 0; }
        .booking-row {
            background: #fff;
            border: 1px solid #f5e0ee;
            border-radius: 14px;
            padding: 18px 22px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            transition: box-shadow .2s;
            cursor: pointer;
        }
        .booking-row:hover { box-shadow: 0 4px 18px rgba(233,30,140,0.10); }
        .booking-info h6 { font-weight: 700; margin-bottom: 4px; }
        .booking-info p  { font-size: .85rem; color: #888; margin: 0; }
        .bstatus { display: inline-block; padding: 3px 12px; border-radius: 99px; font-size: .78rem; font-weight: 700; }
        .CONFIRMED { background: #d4edda; color: #155724; }
        .CANCELLED { background: #f8d7da; color: #721c24; }
        .PENDING   { background: #fff3cd; color: #856404; }
        .BOOKED    { background: #cfe2ff; color: #084298; }
        .cancel-btn {
            background: none;
            border: 1.5px solid #e91e8c;
            color: #e91e8c;
            border-radius: 99px;
            padding: 5px 18px;
            font-size: .82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        .cancel-btn:hover { background: #e91e8c; color: #fff; }
        .readonly-field { background: #f8f9fa !important; color: #555; font-weight: 600; }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="top-nav navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html" style="text-decoration:none;">
                <img src="images/cozy.png" style="height:40px;" alt="logo" />
                <span style="font-weight:800; color:#222; font-size:1rem;">Cozy Haven Stay</span>
            </a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a href="hotels.html" class="btn btn-sm rounded-pill px-3"
                    style="border:1.5px solid var(--pink); color:var(--pink); font-weight:600;">Explore</a>
                <a href="user-dashboard.html" class="btn btn-pink btn-sm rounded-pill px-3 fw-bold">Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- BOOKING FORM -->
    <div id="bookingFormSection" style="display:none;">
        <div class="booking-card">

            <div id="roomLoading" class="text-center py-3">
                <div class="spinner-border spinner-border-sm" style="color:var(--pink);"></div>
                <span class="ms-2 text-muted">Loading room details...</span>
            </div>

            <div id="roomDetails" style="display:none;">
                <h4 class="booking-title" id="roomName"></h4>
                <div class="row mb-2">
                    <div class="col-6"><p><strong>Room Type:</strong> <span id="roomType"></span></p></div>
                    <div class="col-6"><p><strong>Bed Type:</strong> <span id="bedType"></span></p></div>
                </div>
                <p><strong>Base Price:</strong> ₹<span id="roomPrice"></span> / night</p>
            </div>

            <hr style="border-color:#f5e0ee;" />

            <form id="bookingForm">
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label fw-bold">User ID</label>
                        <input type="text" id="displayUserId" class="form-control readonly-field" readonly />
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold">Room ID</label>
                        <input type="text" id="displayRoomId" class="form-control readonly-field" readonly />
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label fw-bold">Check-in Date</label>
                        <input type="date" id="checkIn" class="form-control" required />
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold">Check-out Date</label>
                        <input type="date" id="checkOut" class="form-control" required />
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-4">
                        <label class="form-label fw-bold">Rooms</label>
                        <input type="number" id="noOfRooms" class="form-control" value="1" min="1" required />
                    </div>
                    <div class="col-4">
                        <label class="form-label fw-bold">Adults</label>
                        <input type="number" id="adults" class="form-control" value="1" min="1" required />
                    </div>
                    <div class="col-4">
                        <label class="form-label fw-bold">Children</label>
                        <input type="number" id="children" class="form-control" value="0" min="0" />
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Payment Method</label>
                    <select id="paymentMethod" class="form-select"
                        style="border:1.5px solid #f5e0ee; box-shadow:none;" required>
                        <option value="CARD">Credit / Debit Card</option>
                        <option value="UPI">UPI</option>
                        <option value="BANK">Net Banking</option>
                        <option value="PAY_AT_HOTEL">Pay at Hotel</option>
                    </select>
                </div>

                <div class="mb-4 p-3 rounded" style="background:#fff0f6; border:1px dashed var(--pink);">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold">Total Stay Amount:</span>
                        <span class="h4 mb-0 fw-bolder" style="color:var(--pink);">
                            ₹<span id="displayTotalAmount">0</span>
                        </span>
                    </div>
                    <small class="text-muted" id="nightsInfo"></small>
                </div>

                <button type="submit" class="btn btn-pink w-100 rounded-pill py-3 fw-bold" style="font-size:1.05rem;">
                    <i class="fa fa-check me-2"></i>Confirm Booking
                </button>
            </form>
        </div>
    </div>

    <!-- MY BOOKINGS LIST -->
    <div id="myBookingsSection" style="display:none;" class="bookings-section">
        <div class="container">
            <h4 class="fw-bold mb-1">My Bookings</h4>
            <p class="text-muted mb-4" style="font-size:.9rem;">All your current and past bookings</p>
            <div id="bookingsList">
                <div class="text-center py-5">
                    <div class="spinner-border" style="color:var(--pink);"></div>
                    <p class="mt-2 text-muted">Loading bookings...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>

		const BOOK_API = 'http://localhost:8080/api';
		
		const urlParams = new URLSearchParams(window.location.search);
		const bookRoomId = urlParams.get('roomId');
		const bookRoomName = urlParams.get('room');
		const bookBedType = urlParams.get('bed');
		const bookRoomPrice = urlParams.get('price');
		
		let pricePerNight = parseFloat(bookRoomPrice) || 0;
		let loggedInUserId = null;
		
		let currentHotelId = sessionStorage.getItem('bookingHotelId')
		    ? parseInt(sessionStorage.getItem('bookingHotelId'), 10)
		    : null;
		
		function getAuthHeaders() {
		    const email = sessionStorage.getItem('userEmail');
		    const password = sessionStorage.getItem('userPassword');
		
		    if (!email || !password) {
		        return { 'Content-Type': 'application/json' };
		    }
		
		    return {
		        'Authorization': `Basic ${btoa(`${email}:${password}`)}`,
		        'Content-Type': 'application/json'
		    };
		}
		
		document.addEventListener('DOMContentLoaded', async () => {
		
		    const userRole = sessionStorage.getItem('userRole');
		    const userEmail = sessionStorage.getItem('userEmail');
		
		    if (!userRole || !userEmail || userRole !== 'USER') {
		        sessionStorage.setItem('redirectAfterLogin', window.location.href);
		        window.location.href = 'login.html';
		        return;
		    }
		
		    document.getElementById('bookingFormSection').style.display = 'block';
		
		    await fetchUserIdFromDB(userEmail);
		    await fetchRoomFromDB();
		    initBookingForm();
		});
		
		
		async function fetchUserIdFromDB(userEmail) {
		
		    try {
		
		        const res = await fetch(
		            `${BOOK_API}/users/email/${encodeURIComponent(userEmail)}`,
		            { credentials: 'include', headers: getAuthHeaders() }
		        );
		
		        if (res.ok) {
		
		            const userData = await res.json();
		            loggedInUserId = userData.userId ?? userData.user_id;
		
		            document.getElementById('displayUserId').value = loggedInUserId ?? 'N/A';
		
		            sessionStorage.setItem('userId', loggedInUserId);
		
		        } else {
		
		            document.getElementById('displayUserId').value = 'N/A';
		
		        }
		
		    } catch (err) {
		
		        console.error('Failed to fetch userId:', err);
		        document.getElementById('displayUserId').value = 'N/A';
		
		    }
		}
		
		
		async function fetchRoomFromDB() {
		
		    const loadingEl = document.getElementById('roomLoading');
		    const detailsEl = document.getElementById('roomDetails');
		
		    try {
		
		        const res = await fetch(`${BOOK_API}/rooms/getbyid/${bookRoomId}`, {
		            credentials: 'include',
		            headers: getAuthHeaders()
		        });
		
		        if (!res.ok) throw new Error('Room not found');
		
		        const room = await res.json();
		
		        const roomType = room.roomType ?? room.room_type ?? bookRoomName ?? 'Standard';
		        const roomSize = room.roomSize ?? room.room_size ?? roomType;
		        const bedType = room.bedType ?? room.bed_type ?? bookBedType ?? 'N/A';
		        const baseFare = room.baseFare ?? room.base_fare ?? bookRoomPrice ?? 0;
		        const roomId = room.roomId ?? bookRoomId;
		
		        pricePerNight = parseFloat(baseFare);
		
		        document.getElementById('roomName').innerText = `Book ${roomSize} Room`;
		        document.getElementById('roomType').innerText = roomType;
		        document.getElementById('bedType').innerText = bedType;
		        document.getElementById('roomPrice').innerText = baseFare;
		
		        document.getElementById('displayRoomId').value = roomId;
		
		    } catch (err) {
		
		        console.error('Room fetch failed:', err);
		
		    }
		
		    loadingEl.style.display = 'none';
		    detailsEl.style.display = 'block';
		}
		
		
		function initBookingForm() {
		
		    const checkInInput = document.getElementById('checkIn');
		    const checkOutInput = document.getElementById('checkOut');
		    const noOfRoomsInput = document.getElementById('noOfRooms');
		    const form = document.getElementById('bookingForm');
		
		    const today = new Date().toISOString().split('T')[0];
		
		    checkInInput.min = today;
		    checkOutInput.min = today;
		
		
		    function updateTotal() {
		
		        const cin = checkInInput.value;
		        const cout = checkOutInput.value;
		        const rooms = parseInt(noOfRoomsInput.value || '1');
		
		        if (cin && cout) {
		
		            const dIn = new Date(cin);
		            const dOut = new Date(cout);
		
		            if (dOut > dIn) {
		
		                const nights = Math.ceil((dOut - dIn) / (1000 * 3600 * 24));
		                const total = nights * rooms * pricePerNight;
		
		                document.getElementById('displayTotalAmount').innerText = total.toFixed(2);
		
		                document.getElementById('nightsInfo').innerText =
		                    `${nights} night(s) × ${rooms} room(s) × ₹${pricePerNight}/night`;
		
		            }
		
		        }
		
		    }
		
		    [checkInInput, checkOutInput, noOfRoomsInput].forEach(el => {
		
		        el.addEventListener('change', updateTotal);
		        el.addEventListener('input', updateTotal);
		
		    });
		
		
		    form.addEventListener('submit', async (e) => {
		
		        e.preventDefault();
		
		        const checkIn = checkInInput.value;
		        const checkOut = checkOutInput.value;
		
		        const noOfRooms = parseInt(noOfRoomsInput.value);
		        const adults = parseInt(document.getElementById('adults').value);
		        const children = parseInt(document.getElementById('children').value);
		
		        const paymentMethod = document.getElementById('paymentMethod').value;
		
		        if (!currentHotelId) {
		
		            alert('Hotel information could not be loaded.');
		            return;
		
		        }
		
		        const nights = Math.ceil((new Date(checkOut) - new Date(checkIn)) / (1000 * 3600 * 24));
		
		        const totalAmount = nights * noOfRooms * pricePerNight;
		
		        const bookingPayload = {
		
		            userId: loggedInUserId,
		            hotelId: currentHotelId,
		            roomId: parseInt(bookRoomId),
		            checkIn: checkIn,
		            checkOut: checkOut,
		            adults: adults,
		            children: children,
		            noOfRooms: noOfRooms,
		            totalAmount: totalAmount,
		            paymentMode: paymentMethod
		
		        };
		
		        try {
		
		            const res = await fetch(`${BOOK_API}/bookings/book-room`, {
		
		                method: 'POST',
		                credentials: 'include',
		                headers: getAuthHeaders(),
		                body: JSON.stringify(bookingPayload)
		
		            });
		
		            if (!res.ok) throw new Error('Booking failed');
		
		            const bookingsRes = await fetch(`${BOOK_API}/bookings/user/${loggedInUserId}`, {
		
		                credentials: 'include',
		                headers: getAuthHeaders()
		
		            });
		
		            const bookings = await bookingsRes.json();
		
		            const latest = bookings[bookings.length - 1];
		
		            const newBookingId = latest.bookingId;
		
		            window.location.href = `booking-details.html?bookingId=${newBookingId}`;
		
		        }
		
		        catch (err) {
		
		            alert('Booking failed: ' + err.message);
		
		        }
		
		    });
		
		}

</script>
</body>
</html>
