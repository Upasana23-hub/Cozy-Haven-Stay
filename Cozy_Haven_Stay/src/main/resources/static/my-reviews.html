<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Reviews - Cozy Haven Stay</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
  .review-card {
    background: #fff;
    border: 1px solid #f5e0ee;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 16px;
    transition: box-shadow 0.2s;
  }
  .review-card:hover {
    box-shadow: 0 4px 18px rgba(233, 30, 140, 0.10);
  }
  .star-filled { color: #f59e0b; }
  .star-empty  { color: #d1d5db; }
  .review-hotel {
    font-size: 0.82rem;
    background: #fdf2f8;
    color: var(--pink);
    padding: 3px 12px;
    border-radius: 99px;
    font-weight: 600;
    display: inline-block;
    margin-bottom: 8px;
  }
  .review-date {
    font-size: 0.8rem;
    color: #aaa;
  }
  .no-reviews {
    text-align: center;
    padding: 60px 20px;
    color: #aaa;
  }
  .no-reviews i {
    font-size: 3rem;
    color: #f5e0ee;
    margin-bottom: 16px;
    display: block;
  }
</style>
</head>
<body>

<div class="container-fluid mt-4">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-3">
      <div class="dash-sidebar text-center">
        <div class="mb-4">
          <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQkAg6KSS1O5eXQy0iXXghPdSOrBPBMpQkpJcz5_UpAF9uGUuJK"
               style="width:70px;height:70px;border-radius:50%;margin-bottom:8px;">
          <h6 id="sidebarUserName">Loading...</h6>
          <small style="color:#888;" id="sidebarUserRole">User</small>
        </div>
        <hr>
        <div class="dash-nav">
          <a href="user-dashboard.html" class="active"><i class="fa fa-home"></i> Dashboard</a>
                        <a href="hotels.html"><i class="fa fa-hotel"></i> Search Hotels</a>
                        <a href="booking-user.html"><i class="fa fa-calendar"></i> My Bookings</a>
                        <a href="payment-user.html"><i class="fa fa-credit-card"></i> Payments</a>
                        <a href="my-reviews.html"><i class="fa fa-star"></i> Reviews</a>
                        <a href="user-profile.html"><i class="fa fa-user"></i> Profile</a>
                        <a href="#" id="sidebarLogout"><i class="fa fa-sign-out"></i> Logout</a>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-9">
      <div class="welcome-bar mb-4">
        <h5>My Reviews</h5>
        <p>All the reviews you've submitted on Cozy Haven Stay</p>
      </div>

      <!-- Reviews count badge -->
      <div class="mb-3">
        <span class="badge rounded-pill px-3 py-2"
              style="background:#fdf2f8; color:var(--pink); font-size:0.85rem; font-weight:600;">
          <i class="fa fa-star me-1"></i>
          <span id="reviewCount">0</span> Review(s)
        </span>
      </div>

      <!-- Reviews List -->
      <div id="reviewsList">
        <div class="text-center py-5">
          <div class="spinner-border" style="color:var(--pink);"></div>
          <p class="mt-2 text-muted">Loading your reviews...</p>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const BASE_URL = 'http://localhost:8080/api';

  function getAuthHeaders() {
    const email    = sessionStorage.getItem('userEmail');
    const password = sessionStorage.getItem('userPassword');
    if (!email || !password) return {};
    return {
      'Authorization': `Basic ${btoa(`${email}:${password}`)}`,
      'Content-Type': 'application/json'
    };
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const role  = sessionStorage.getItem('userRole');
    const email = sessionStorage.getItem('userEmail');

    if (!role || role !== 'USER') {
      window.location.href = 'login.html';
      return;
    }

    document.getElementById('sidebarUserName').innerText = email;

    document.getElementById('sidebarLogout').addEventListener('click', () => {
      sessionStorage.clear();
      window.location.href = 'login.html';
    });

    await loadMyReviews(email);
  });

  async function loadMyReviews(userEmail) {
    const container = document.getElementById('reviewsList');

    try {
      
      const userRes = await fetch(
        `${BASE_URL}/users/email/${encodeURIComponent(userEmail)}`,
        { credentials: 'include', headers: getAuthHeaders() }
      );
      if (!userRes.ok) throw new Error('Could not fetch user details');
      const userData = await userRes.json();
      const userId   = userData.userId ?? userData.user_id;

     
      const revRes = await fetch(`${BASE_URL}/reviews/user/${userId}`, {
        credentials: 'include',
        headers: getAuthHeaders()
      });
      if (!revRes.ok) throw new Error('Could not fetch reviews');
      const myReviews = await revRes.json();

      document.getElementById('reviewCount').innerText = myReviews.length;

      if (myReviews.length === 0) {
        container.innerHTML = `
          <div class="no-reviews">
            <i class="fa fa-star"></i>
            <h5>No reviews yet</h5>
            <p>You haven't reviewed any hotels yet.</p>
            <a href="hotels.html" class="btn btn-pink rounded-pill px-4 fw-bold mt-2">Explore Hotels</a>
          </div>`;
        return;
      }

      container.innerHTML = myReviews.map(r => {
        const hotelName  = r.hotelName ?? r.hotel?.name ?? `Hotel #${r.hotelId ?? r.hotel?.hotelId ?? ''}`;
        const rating     = r.rating  ?? 0;
        const comment    = r.comment ?? '';
        const date       = r.createdAt ?? r.created_at ?? r.reviewDate ?? '';

        const formattedDate = date
          ? new Date(date).toLocaleDateString('en-IN', {
              day: '2-digit', month: 'short', year: 'numeric'
            })
          : '';

        const stars = Array.from({ length: 5 }, (_, i) =>
          `<i class="fa fa-star ${i < rating ? 'star-filled' : 'star-empty'}"></i>`
        ).join('');

        return `
          <div class="review-card">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
              <div>
                <span class="review-hotel">
                  <i class="fa fa-hotel me-1"></i>${hotelName}
                </span>
                <div class="mb-1">${stars}</div>
                <p class="mb-0 text-secondary">${comment}</p>
              </div>
              <small class="review-date">
                <i class="fa fa-calendar me-1"></i>${formattedDate}
              </small>
            </div>
          </div>`;
      }).join('');

    } catch (err) {
      console.error('Error loading reviews:', err);
      container.innerHTML = `
        <div class="text-center text-danger py-5">
          Failed to load reviews. Check backend connection.
        </div>`;
    }
  }
</script>

</body>
</html>
