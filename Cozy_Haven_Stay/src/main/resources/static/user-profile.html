<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Cozy Haven Stay</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: #fffafc;
        }

        .profile-sidebar {
            background: white;
            border-radius: 16px;
            border: 1px solid #f5e0ee;
            padding: 28px 18px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(233, 30, 140, 0.06);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--pink, #e91e8c);
            margin-bottom: 14px;
        }

        .profile-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #f5e0ee;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(233, 30, 140, 0.06);
        }

        .profile-field:disabled {
            background: #fdf2f8;
            border-color: #f5e0ee;
            color: #444;
        }

        .dash-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            color: #444;
            font-weight: 500;
            font-size: 0.92rem;
            text-decoration: none;
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .dash-nav a:hover,
        .dash-nav a.active {
            background: #fce7f3;
            color: var(--pink, #e91e8c);
        }
    </style>
</head>

<body>

    <div class="container-fluid mt-4">
        <div class="row g-4">

            <!-- SIDEBAR -->
            <div class="col-md-3">
                <div class="profile-sidebar">
                    <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQkAg6KSS1O5eXQy0iXXghPdSOrBPBMpQkpJcz5_UpAF9uGUuJK"
                        class="profile-avatar" alt="Profile Photo">
                    <h6 class="fw-bold mb-0" id="profileNameBig">Loading...</h6>
                    <small class="text-muted" id="profileRole">User</small>
                    <hr>
                    <div class="dash-nav text-start mt-2">
                        <a href="user-dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
                        <a href="hotels.html"><i class="fa fa-hotel"></i> Search Hotels</a>
                        <a href="my-bookings.html"><i class="fa fa-calendar"></i> My Bookings</a>
                        <a href="user-profile.html" class="active"><i class="fa fa-user"></i> Profile</a>
                        <a href="#" id="profileLogout"><i class="fa fa-sign-out"></i> Logout</a>
                    </div>
                </div>
            </div>

            <!-- PROFILE FORM -->
            <div class="col-md-9">
                <div class="profile-card">
                    <h5 class="fw-bold mb-4"><i class="fa fa-user-circle me-2" style="color:var(--pink,#e91e8c);"></i>My
                        Profile</h5>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">First Name</label>
                            <input type="text" id="profileFirstName" class="form-control profile-field" disabled
                                placeholder="First name">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Last Name</label>
                            <input type="text" id="profileLastName" class="form-control profile-field" disabled
                                placeholder="Last name">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" id="profileEmail" class="form-control profile-field" disabled
                                placeholder="Email">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input type="tel" id="profilePhone" class="form-control profile-field" disabled
                                placeholder="Phone">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Role</label>
                            <input type="text" id="profileRole" class="form-control" disabled placeholder="Role">
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-3">
                        <button class="btn btn-pink rounded-pill px-4" id="editProfileBtn">
                            <i class="fa fa-pen me-1"></i> Edit Profile
                        </button>
                        <button class="btn rounded-pill px-4 fw-bold" id="saveProfileBtn"
                            style="display:none; background:#22c55e; color:white; border:none;">
                            <i class="fa fa-save me-1"></i> Save Changes
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initUserProfile();
        });
    </script>

</body>

</html>
