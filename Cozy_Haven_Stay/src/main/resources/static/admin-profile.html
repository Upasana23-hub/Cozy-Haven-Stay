<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Profile - Cozy Haven Stay</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

body {
  background: #fffafc;
  font-family: 'Segoe UI', sans-serif;
}

/* ── Sidebar ── */
.dash-sidebar {
  background: white;
  border-radius: 16px;
  border: 1px solid #f5e0ee;
  padding: 28px 18px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(233,30,140,0.06);
  position: sticky;
  top: 20px;
}

.dash-sidebar img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 3px solid #e91e8c;
  margin-bottom: 10px;
  object-fit: cover;
}

.dash-nav a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  color: #444;
  font-weight: 500;
  font-size: 0.92rem;
  text-decoration: none;
  transition: all .2s;
  margin-bottom: 4px;
}

.dash-nav a:hover,
.dash-nav a.active {
  background: #fce7f3;
  color: #e91e8c;
}

/* ── Welcome bar ── */
.welcome-bar {
  background: linear-gradient(135deg, #e91e8c 0%, #f06292 100%);
  color: white;
  border-radius: 16px;
  padding: 24px 28px;
  box-shadow: 0 4px 20px rgba(233,30,140,0.2);
  margin-bottom: 24px;
}

.welcome-bar h5 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
.welcome-bar p  { margin: 0; opacity: .85; font-size: 0.93rem; }

/* ── Profile avatar in welcome bar ── */
.welcome-avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.7);
  object-fit: cover;
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  color: white;
  flex-shrink: 0;
}

/* ── Section card ── */
.section-card {
  background: white;
  border-radius: 16px;
  border: 1px solid #f5e0ee;
  padding: 28px;
  box-shadow: 0 4px 20px rgba(233,30,140,0.06);
}

.section-card h6 {
  font-weight: 700;
  color: #222;
  margin-bottom: 22px;
  font-size: 1rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-card h6 i { color: #e91e8c; }

/* ── Form fields ── */
.form-label {
  font-size: 0.82rem;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}

.form-control {
  border-radius: 10px;
  border: 1.5px solid #f5e0ee;
  background: #fdf2f8;
  color: #333;
  font-size: 0.93rem;
  padding: 10px 14px;
  transition: border .2s;
}

.form-control:focus {
  border-color: #e91e8c;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(233,30,140,0.08);
}

.form-control:disabled {
  background: #fdf2f8;
  border-color: #f5e0ee;
  color: #444;
  cursor: default;
}

/* ── Field icon wrapper ── */
.field-icon-wrap {
  position: relative;
}

.field-icon-wrap i {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #e91e8c;
  opacity: 0.5;
  font-size: 0.9rem;
  pointer-events: none;
}

.field-icon-wrap .form-control {
  padding-right: 38px;
}

</style>
</head>
<body>

<div class="container-fluid mt-4 mb-5">
  <div class="row g-4">

    <!-- SIDEBAR -->
    <div class="col-md-3">
      <div class="dash-sidebar">
        <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQkAg6KSS1O5eXQy0iXXghPdSOrBPBMpQkpJcz5_UpAF9uGUuJK" alt="Admin">
        <h6 class="fw-bold mb-0" id="sidebarName">Loading...</h6>
        <small class="text-muted">Administrator</small>
        <hr>
        <div class="dash-nav text-start mt-2">
          <a href="admin-dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
          <a href="manage-users.html"><i class="fa fa-users"></i> Manage Users</a>
          <a href="manage-owners.html"><i class="fa fa-user-shield"></i> Manage Owners</a>
          <a href="bookings.html"><i class="fa fa-calendar"></i> All Bookings</a>
          <a href="admin-profile.html" class="active"><i class="fa fa-user"></i> Profile</a>
          <a href="index.html" id="adminLogout"><i class="fa fa-sign-out"></i> Logout</a>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-9">

      <!-- Welcome Bar -->
      <div class="welcome-bar">
        <div class="d-flex align-items-center gap-3">
          <div class="welcome-avatar">
            <i class="fa fa-user-shield"></i>
          </div>
          <div>
            <h5 class="mb-1"><span id="welcomeName">Admin</span></h5>
            <p><i class="fa fa-envelope me-1" style="opacity:.8;"></i><span id="welcomeEmail">—</span></p>
          </div>
        </div>
      </div>

      <!-- Profile Details Card -->
      <div class="section-card">
        <h6><i class="fa fa-id-card"></i> Profile Details</h6>

        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <div class="field-icon-wrap">
              <input type="text" id="profileName" class="form-control" disabled>
              <i class="fa fa-user"></i>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Email Address</label>
            <div class="field-icon-wrap">
              <input type="email" id="profileEmail" class="form-control" disabled>
              <i class="fa fa-envelope"></i>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Phone Number</label>
            <div class="field-icon-wrap">
              <input type="text" id="profilePhone" class="form-control" disabled>
              <i class="fa fa-phone"></i>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Role</label>
            <div class="field-icon-wrap">
              <input type="text" id="profileRole" class="form-control" disabled>
              <i class="fa fa-shield-halved"></i>
            </div>
          </div>

          <div class="col-md-12">
            <label class="form-label">Address</label>
            <div class="field-icon-wrap">
              <input type="text" id="profileAddress" class="form-control" disabled>
              <i class="fa fa-location-dot"></i>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const role = sessionStorage.getItem('userRole');
  if (!role || role !== 'ADMIN') {
    window.location.href = 'login.html';
    return;
  }

  document.getElementById('adminLogout').addEventListener('click', () => {
    sessionStorage.clear();
    window.location.href = 'login.html';
  });

  loadAdminProfile();
});

function loadAdminProfile() {
  const email    = sessionStorage.getItem('userEmail');
  const password = sessionStorage.getItem('userPassword');

  if (!email || !password) {
    window.location.href = 'login.html';
    return;
  }

  fetch(`http://localhost:8080/api/users/email/${email}`, {
    method: 'GET',
    headers: {
      'Authorization': 'Basic ' + btoa(email + ':' + password)
    }
  })
  .then(res => {
    if (!res.ok) throw new Error('Failed to load profile');
    return res.json();
  })
  .then(user => {
    // Sidebar
    document.getElementById('sidebarName').innerText = user.name || email;

    // Welcome bar
    document.getElementById('welcomeName').innerText  = user.name  || email;
    document.getElementById('welcomeEmail').innerText = user.email || email;

    // Fields
    document.getElementById('profileName').value    = user.name    || '';
    document.getElementById('profileEmail').value   = user.email   || '';
    document.getElementById('profilePhone').value   = user.phone   || '';
    document.getElementById('profileRole').value    = user.role    || '';
    document.getElementById('profileAddress').value = user.address || '';
  })
  .catch(err => {
    console.error(err);
    document.getElementById('sidebarName').innerText  = email;
    document.getElementById('welcomeName').innerText  = email;
    document.getElementById('welcomeEmail').innerText = email;
  });
}

</script>
</body>
</html>
