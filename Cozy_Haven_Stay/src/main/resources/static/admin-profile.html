<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Profile - Cozy Haven Stay</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background:#fffafc;
}

.profile-sidebar{
    background:white;
    border-radius:16px;
    border:1px solid #f5e0ee;
    padding:28px 18px;
    text-align:center;
    box-shadow:0 4px 20px rgba(233,30,140,0.06);
}

.profile-avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #e91e8c;
    margin-bottom:14px;
}

.profile-card{
    background:white;
    border-radius:16px;
    border:1px solid #f5e0ee;
    padding:28px;
    box-shadow:0 4px 20px rgba(233,30,140,0.06);
}

.profile-field:disabled{
    background:#fdf2f8;
    border-color:#f5e0ee;
    color:#444;
}

.dash-nav a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 14px;
    border-radius:10px;
    color:#444;
    font-weight:500;
    font-size:0.92rem;
    text-decoration:none;
    transition:all .2s;
    margin-bottom:4px;
}

.dash-nav a:hover,
.dash-nav a.active{
    background:#fce7f3;
    color:#e91e8c;
}

</style>
</head>


<body>

<div class="container-fluid mt-4">

<div class="row g-4">

<!-- SIDEBAR -->

<div class="col-md-3">

<div class="profile-sidebar">

<img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQkAg6KSS1O5eXQy0iXXghPdSOrBPBMpQkpJcz5_UpAF9uGUuJK"
class="profile-avatar">

<h6 class="fw-bold mb-0" id="profileNameBig">Loading...</h6>

<small class="text-muted" id="profileRoleText">User</small>

<hr>

<div class="dash-nav text-start mt-2">

<a href="admin-dashboard.html" class="active"><i class="fa fa-home"></i> Dashboard</a>
          <a href="manage-users.html"><i class="fa fa-users"></i> Manage Users</a>
          <a href="manage-owners.html"><i class="fa fa-user-shield"></i> Manage Owners</a>
          <a href="bookings.html"><i class="fa fa-calendar"></i> All Bookings</a>

<a href="admin-profile.html" class="active">
<i class="fa fa-user"></i> Profile
</a>

<a href="#" id="profileLogout">
<i class="fa fa-sign-out"></i> Logout
</a>

</div>

</div>

</div>


<!-- PROFILE CARD -->

<div class="col-md-9">

<div class="profile-card">

<h5 class="fw-bold mb-4">
<i class="fa fa-user-circle me-2" style="color:#e91e8c;"></i>
My Profile
</h5>

<div class="row g-3">

<div class="col-md-6">
<label class="form-label fw-semibold">Name</label>
<input type="text" id="profileName" class="form-control profile-field" disabled>
</div>

<div class="col-md-6">
<label class="form-label fw-semibold">Email</label>
<input type="email" id="profileEmail" class="form-control profile-field" disabled>
</div>

<div class="col-md-6">
<label class="form-label fw-semibold">Phone</label>
<input type="text" id="profilePhone" class="form-control profile-field" disabled>
</div>

<div class="col-md-6">
<label class="form-label fw-semibold">Role</label>
<input type="text" id="profileRole" class="form-control" disabled>
</div>

<div class="col-md-12">
<label class="form-label fw-semibold">Address</label>
<input type="text" id="profileAddress" class="form-control profile-field" disabled>
</div>

</div>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>

function loadUserProfile(){

    const email = sessionStorage.getItem("userEmail");
    const password = sessionStorage.getItem("userPassword");

    if(!email || !password){
        window.location.href="login.html";
        return;
    }

    fetch(`http://localhost:8080/api/users/email/${email}`,{

        method:"GET",

        headers:{
            "Authorization":"Basic "+btoa(email+":"+password)
        }

    })

    .then(response=>{

        if(!response.ok){
            throw new Error("Failed to load user profile");
        }

        return response.json();

    })

    .then(user=>{

        document.getElementById("profileNameBig").innerText=user.name;
        document.getElementById("profileRoleText").innerText=user.role;

        document.getElementById("profileName").value=user.name;
        document.getElementById("profileEmail").value=user.email;
        document.getElementById("profilePhone").value=user.phone;
        document.getElementById("profileAddress").value=user.address;
        document.getElementById("profileRole").value=user.role;

    })

    .catch(error=>{

        console.error(error);

    });

}


/* LOGOUT */

document.getElementById("profileLogout").onclick=function(){

    sessionStorage.clear();

    window.location.href="login.html";

};


document.addEventListener("DOMContentLoaded",function(){

    loadUserProfile();

});

</script>

</body>
</html>
