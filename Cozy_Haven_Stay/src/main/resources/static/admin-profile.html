<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Profile - Cozy Haven Stay</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container-fluid mt-4">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-3">
      <div class="dash-sidebar text-center">
        <div class="mb-4">
          <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQkAg6KSS1O5eXQy0iXXghPdSOrBPBMpQkpJcz5_UpAF9uGUuJK"
               style="width:70px;height:70px;border-radius:50%;margin-bottom:8px;">
          <h6 id="profileNameBig">Loading...</h6>
          <small style="color:#888;" id="profileRoleText">Administrator</small>
        </div>
        <hr>
        <div class="dash-nav text-start">
          <a href="admin-dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
          <a href="manage-users.html"><i class="fa fa-users"></i> Manage Users</a>
          <a href="manage-owners.html"><i class="fa fa-user-shield"></i> Manage Owners</a>
          <a href="bookings.html"><i class="fa fa-calendar"></i> All Bookings</a>
          <a href="admin-profile.html" class="active"><i class="fa fa-user"></i> Profile</a>
          <a href="index.html" id="profileLogout"><i class="fa fa-sign-out"></i> Logout</a>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-9">

      <!-- Welcome Bar -->
      <div class="welcome-bar mb-4">
        <h5><i class="fa fa-user-circle me-2"></i>My Profile</h5>
        <p>View your account details</p>
      </div>

      <!-- Profile Card -->
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
          <div class="row g-3">

            <div class="col-md-6">
              <label class="form-label fw-semibold">Name</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fa fa-user"></i></span>
                <input type="text" id="profileName" class="form-control" disabled style="background:#f8f9fa;">
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Email</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fa fa-envelope"></i></span>
                <input type="email" id="profileEmail" class="form-control" disabled style="background:#f8f9fa;">
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Phone</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fa fa-phone"></i></span>
                <input type="text" id="profilePhone" class="form-control" disabled style="background:#f8f9fa;">
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Role</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fa fa-shield"></i></span>
                <input type="text" id="profileRole" class="form-control" disabled style="background:#f8f9fa;">
              </div>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fa fa-location-dot"></i></span>
                <input type="text" id="profileAddress" class="form-control" disabled style="background:#f8f9fa;">
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function loadUserProfile() {
    const email = sessionStorage.getItem('userEmail');
    const password = sessionStorage.getItem('userPassword');

    if (!email || !password) {
      window.location.href = 'login.html';
      return;
    }

    fetch(`http://localhost:8080/api/users/email/${email}`, {
      method: 'GET',
      headers: { 'Authorization': 'Basic ' + btoa(email + ':' + password) }
    })
      .then(res => {
        if (!res.ok) throw new Error('Failed to load user profile');
        return res.json();
      })
      .then(user => {
        document.getElementById('profileNameBig').innerText = user.name;
        document.getElementById('profileRoleText').innerText = user.role;
        document.getElementById('profileName').value = user.name;
        document.getElementById('profileEmail').value = user.email;
        document.getElementById('profilePhone').value = user.phone;
        document.getElementById('profileAddress').value = user.address;
        document.getElementById('profileRole').value = user.role;
      })
      .catch(err => console.error(err));
  }

  document.getElementById('profileLogout').addEventListener('click', (e) => {
    e.preventDefault();
    sessionStorage.clear();
    window.location.href = 'login.html';
  });

  document.addEventListener('DOMContentLoaded', loadUserProfile);
</script>

</body>
</html>
