<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Payments - Cozy Haven Stay</title>
    <link rel="icon" type="image/png" href="images/cozy.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .booking-card {
            background: #fff;
            border: 1px solid #f5e0ee;
            border-radius: 14px;
            padding: 14px 20px;
            margin-bottom: 6px;
            transition: box-shadow 0.2s;
            width: 100%;
        }
        .booking-card:hover {
            box-shadow: 0 3px 14px rgba(233, 30, 140, 0.10);
        }
        .booking-id {
            font-size: 0.8rem;
            background: #fdf2f8;
            color: var(--pink);
            padding: 2px 10px;
            border-radius: 99px;
            font-weight: 700;
            display: inline-block;
        }
        .payment-paid    { background: #e8f5e9; color: #2e7d32; }
        .payment-pending { background: #fff8e1; color: #f57f17; }
        .payment-refunded { background: #e3f2fd; color: #0d47a1; }

        .status-badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 99px;
        }
        .no-bookings {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }
        .no-bookings i {
            font-size: 3rem;
            color: #f5e0ee;
            margin-bottom: 16px;
            display: block;
        }
        .info-label {
            font-size: 0.72rem;
            color: #bbb;
            margin-bottom: 1px;
            white-space: nowrap;
        }
        .info-value {
            font-size: 0.88rem;
            font-weight: 700;
            color: #333;
            white-space: nowrap;
        }
        .divider-v {
            width: 1px;
            background: #f5e0ee;
            align-self: stretch;
            margin: 0 4px;
        }
        .dash-sidebar {
            background: #fff;
            border-radius: 20px;
            padding: 28px 20px;
            box-shadow: 0 4px 24px rgba(233, 30, 140, 0.08);
            position: sticky;
            top: 20px;
        }
        .sidebar-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--pink);
        }
    </style>
</head>

<body>
    <div class="container-fluid py-4 px-4 mt-4">
        <div class="row g-4">

            <!-- SIDEBAR -->
            <div class="col-lg-3 col-md-4">
                <div class="dash-sidebar text-center">
                    <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQkAg6KSS1O5eXQy0iXXghPdSOrBPBMpQkpJcz5_UpAF9uGUuJK"
                        class="sidebar-avatar mb-3" alt="Owner" />
                    <h6 class="fw-bold mb-0" id="ownerName">Loading...</h6>
                    <small class="text-muted">Hotel Owner</small>
                    <hr class="my-3" />
                    <div class="dash-nav text-start">
                        <a href="owner-dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
                        <a href="add-owner-details.html"><i class="fa fa-user-plus"></i> Add Owner Details</a>
                        <a href="addhotel.html"><i class="fa fa-hotel"></i> Add Hotel</a>
                        <a href="addroom.html"><i class="fa fa-bed"></i> Add Room</a>
                        <a href="manage-rooms.html"><i class="fa fa-list"></i> Manage Rooms</a>
                        <a href="booking-owner.html"><i class="fa fa-calendar"></i> Hotel Bookings</a>
                        <a href="payment-owner.html" class="active"><i class="fa fa-credit-card"></i> Payments</a>
                        <a href="owner-profile.html"><i class="fa fa-user"></i> Profile</a>
                        <a href="#" id="ownerLogout" style="color:#dc3545;">
                            <i class="fa fa-sign-out-alt"></i> Logout
                        </a>
                    </div>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="col-lg-9 col-md-8">

                <!-- Header bar -->
                <div class="welcome-bar mb-4"
                    style="background: linear-gradient(135deg, var(--pink), #c084fc); border-radius: 10px; padding: 20px 24px; color: #fff;">
                    <h5 class="mb-1">Hotel Payments</h5>
                    <p style="margin-bottom:0;">Review all payment transactions for your hotel bookings</p>
                </div>

                <!-- Summary badges -->
                <div class="mb-3 d-flex gap-2 flex-wrap">
                    <span class="badge rounded-pill px-3 py-2"
                        style="background:#fdf2f8; color:var(--pink); font-size:0.85rem; font-weight:600;">
                        <i class="fa fa-credit-card me-1"></i>
                        <span id="paymentCount">0</span> Payment(s)
                    </span>
                    <span class="badge rounded-pill px-3 py-2"
                        style="background:#e8f5e9; color:#2e7d32; font-size:0.85rem; font-weight:600;">
                        <i class="fa fa-indian-rupee-sign me-1"></i>
                        Total Received: ₹<span id="totalRevenue">0</span>
                    </span>
                </div>

                <!-- Error banner -->
                <div id="errorBanner" class="alert alert-danger rounded-3 d-none mb-3"></div>

                <!-- Payments list -->
                <div id="paymentsList">
                    <div class="text-center py-5">
                        <div class="spinner-border" style="color:var(--pink);"></div>
                        <p class="mt-2 text-muted">Loading payments...</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const BASE_URL = 'http://localhost:8080/api';

        // ── Same Basic Auth pattern as all other owner pages ──
        function getAuthHeaders() {
            const email    = sessionStorage.getItem('userEmail');
            const password = sessionStorage.getItem('userPassword');
            if (!email || !password) return { 'Content-Type': 'application/json' };
            return {
                'Authorization': `Basic ${btoa(`${email}:${password}`)}`,
                'Content-Type': 'application/json'
            };
        }

        async function apiFetch(path) {
            const res = await fetch(`${BASE_URL}${path}`, {
                credentials: 'include',
                headers: getAuthHeaders()
            });
            if (!res.ok) throw new Error(`${path} → HTTP ${res.status}`);
            return res.json();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const role  = sessionStorage.getItem('userRole');
            const email = sessionStorage.getItem('userEmail');

            if (!role || (role !== 'OWNER' && role !== 'ADMIN')) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('ownerName').innerText = email || 'Owner';

            document.getElementById('ownerLogout').addEventListener('click', (e) => {
                e.preventDefault();
                sessionStorage.clear();
                window.location.href = 'login.html';
            });

            await loadOwnerPayments(email);
        });

        async function loadOwnerPayments(email) {
            const container = document.getElementById('paymentsList');

            try {
                // STEP 1 — get userId
                let userId = sessionStorage.getItem('userId');
                if (!userId) {
                    const u = await apiFetch(`/users/email/${encodeURIComponent(email)}`);
                    userId  = u.userId ?? u.user_id ?? u.id;
                    if (userId) sessionStorage.setItem('userId', userId);
                }
                if (!userId) throw new Error('Could not resolve your user account.');

                // STEP 2 — get ownerId
                let ownerId = sessionStorage.getItem('ownerId');
                if (!ownerId) {
                    const o = await apiFetch(`/owners/user/${userId}`);
                    ownerId  = o.ownerId ?? o.owner_id;
                    if (ownerId) sessionStorage.setItem('ownerId', ownerId);
                }
                if (!ownerId) throw new Error('Owner profile not found. Please complete Owner Details first.');

                // STEP 3 — get this owner's hotels
                const allHotels = await apiFetch('/hotels/getall');
                const myHotels  = allHotels.filter(h =>
                    String(h.ownerId ?? h.owner?.ownerId ?? h.owner_id) === String(ownerId)
                );

                if (myHotels.length === 0) {
                    container.innerHTML = `
                        <div class="no-bookings">
                            <i class="fa fa-hotel"></i>
                            <h5>No hotels registered yet</h5>
                            <p>Add a hotel first to start receiving payments.</p>
                            <a href="addhotel.html" class="btn btn-primary rounded-pill px-4 fw-bold mt-2">
                                <i class="fa fa-plus me-2"></i>Add Hotel
                            </a>
                        </div>`;
                    return;
                }

                // STEP 4 — fetch bookings per hotel using ROLE_OWNER-accessible endpoint
                // ✅ /bookings/hotel/{hotelId} — same fix as booking-owner.html
                let allBookings = [];
                await Promise.all(myHotels.map(async hotel => {
                    const hotelId = hotel.hotelId ?? hotel.id;
                    try {
                        const bookings = await apiFetch(`/bookings/hotel/${hotelId}`);
                        (bookings ?? []).forEach(b => {
                            allBookings.push({ ...b, _hotelName: hotel.name ?? `Hotel #${hotelId}` });
                        });
                    } catch (e) {
                        console.warn(`Could not load bookings for hotel ${hotelId}:`, e.message);
                    }
                }));

                document.getElementById('paymentCount').innerText = allBookings.length;

                if (allBookings.length === 0) {
                    container.innerHTML = `
                        <div class="no-bookings">
                            <i class="fa fa-wallet"></i>
                            <h5>No payments yet</h5>
                            <p>No payments have been received for your hotels.</p>
                        </div>`;
                    return;
                }

                // Calculate total revenue from PAID bookings
                let revenueSum = 0;
                allBookings.forEach(b => {
                    const status = (b.paymentStatus ?? '').toUpperCase();
                    const amount = parseFloat(b.totalAmount ?? 0);
                    if (status === 'PAID') revenueSum += amount;
                });

                const fmtDate = d => d
                    ? new Date(d).toLocaleDateString('en-IN', {
                        day: '2-digit', month: 'short', year: 'numeric'
                      })
                    : '—';

                container.innerHTML = allBookings.map(b => {
                    const bookingId     = b.bookingId ?? '—';
                    const paymentStatus = (b.paymentStatus ?? 'PENDING').toUpperCase();
                    const totalAmount   = parseFloat(b.totalAmount ?? 0);
                    const bookedAt      = b.bookedAt ?? '';
                    const userId        = b.userId ?? '—';
                    const hotelName     = b._hotelName ?? '—';
                    const bookingStatus = (b.bookingStatus ?? '—').toUpperCase();

                    const paymentClass = paymentStatus === 'PAID'     ? 'payment-paid'
                                       : paymentStatus === 'REFUNDED' ? 'payment-refunded'
                                       : 'payment-pending';

                    const settleBadge = paymentStatus === 'PAID'
                        ? `<span class="badge bg-success rounded-pill px-3 py-2">
                               <i class="fa fa-check-circle me-1"></i>Settled
                           </span>`
                        : paymentStatus === 'REFUNDED'
                        ? `<span class="badge bg-info text-dark rounded-pill px-3 py-2">
                               <i class="fa fa-rotate-left me-1"></i>Refunded
                           </span>`
                        : `<span class="badge bg-warning text-dark rounded-pill px-3 py-2">
                               <i class="fa fa-clock me-1"></i>Pending
                           </span>`;

                    return `
                        <div class="booking-card d-flex align-items-center flex-wrap gap-3">

                            <div style="min-width:160px;">
                                <span class="booking-id">
                                    <i class="fa fa-hashtag me-1"></i>Booking #${bookingId}
                                </span>
                                <div class="info-label mt-1">
                                    <i class="fa fa-hotel me-1"></i>${hotelName}
                                </div>
                                <div class="info-label">User ID: ${userId}</div>
                            </div>

                            <div class="divider-v d-none d-md-block"></div>

                            <div>
                                <div class="info-label"><i class="fa fa-calendar me-1"></i>Booked On</div>
                                <div class="info-value">${fmtDate(bookedAt)}</div>
                            </div>

                            <div class="divider-v d-none d-md-block"></div>

                            <div>
                                <div class="info-label">
                                    <i class="fa fa-indian-rupee-sign me-1"></i>Amount
                                </div>
                                <div class="info-value" style="color:var(--pink);">
                                    ₹${Number(totalAmount).toLocaleString('en-IN')}
                                </div>
                            </div>

                            <div class="divider-v d-none d-md-block"></div>

                            <div>
                                <div class="info-label">Booking Status</div>
                                <span class="status-badge mt-1
                                    ${bookingStatus === 'CANCELLED' ? 'payment-refunded' :
                                      bookingStatus === 'BOOKED' || bookingStatus === 'CONFIRMED'
                                      ? 'payment-paid' : 'payment-pending'}">
                                    ${bookingStatus}
                                </span>
                            </div>

                            <div class="divider-v d-none d-md-block"></div>

                            <div>
                                <div class="info-label">Payment</div>
                                <span class="status-badge mt-1 ${paymentClass}">
                                    ${paymentStatus}
                                </span>
                            </div>

                            <div class="ms-auto">${settleBadge}</div>

                        </div>`;
                }).join('');

                document.getElementById('totalRevenue').innerText =
                    Number(revenueSum).toLocaleString('en-IN');

            } catch (err) {
                console.error('Error loading payments:', err);
                document.getElementById('errorBanner').textContent =
                    'Failed to load payments: ' + err.message;
                document.getElementById('errorBanner').classList.remove('d-none');
                container.innerHTML = '';
            }
        }
    </script>
</body>

</html>
